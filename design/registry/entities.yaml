# ─── FORMULAS (registered by resource-data.md) ───────────────────────────────
# 本 GDD 不"定义"完整公式（公式在战斗 / 伤害 GDD），但注册输入变量范围。

formulas:

  - name: weapon_damage_range
    status: active
    source: design/gdd/resource-data.md
    referenced_by:
      - design/gdd/resource-data.md
    variables:
      - min_damage
      - max_damage
    output_range: [1, 999]
    expression: "randi_range(min_damage, max_damage)"
    notes: "随机整数。Proto: min == max；生产建议 max = min × 1.1–1.2。"
    added: 2026-06-12
    revised: ""

  - name: hit_chance
    status: active
    source: design/gdd/resource-data.md
    referenced_by:
      - design/gdd/resource-data.md
    variables:
      - accuracy
    output_range: [0.0, 1.0]
    expression: "randf() <= accuracy"
    notes: "randf() <= accuracy → 命中。"
    added: 2026-06-12
    revised: ""

  - name: drop_chance
    status: active
    source: design/gdd/resource-data.md
    referenced_by:
      - design/gdd/resource-data.md
    variables:
      - drop_rate
    output_range: [0.0, 1.0]
    expression: "randf() <= drop_rate"
    notes: "每次敌人死亡 = 一次独立 roll。"
    added: 2026-06-12
    revised: ""

  # ── REGISTERED 2026-06-12: Player Input formulas ──
  # 3 formulas from design/gdd/player-input.md Formulas section (F1/F2/F3).
  # These are timing/feedback formulas, NOT damage formulas. Combat math
  # formulas are owned by battle-core-loop.md and damage-calc.md (when written).

  - name: input_latency_budget
    status: active
    source: design/gdd/player-input.md
    referenced_by:
      - design/gdd/player-input.md
    variables:
      - input_to_handler_us
      - handler_to_visual_ms
      - target_frame_ms
    output_range: [0.0, 16.6]
    expression: "min(input_to_handler_us / 1000 + handler_to_visual_ms, target_frame_ms)"
    notes: "F1. Total input-to-visual latency. p99 must be <= 16.5ms (AC-8)."
    added: 2026-06-12
    revised: ""

  - name: input_refused_feedback_duration
    status: active
    source: design/gdd/player-input.md
    referenced_by:
      - design/gdd/player-input.md
    variables:
      - t_hint
      - t_audio
    output_range: [0.0, 0.50]
    expression: "t_hint = clamp(0.30, 0.15, 0.50); t_audio = 0.10"
    notes: "F2. AC-9 verifies hint visibility 0.25-0.35s."
    added: 2026-06-12
    revised: ""

  - name: dash_iframe_curve
    status: active
    source: design/gdd/player-input.md
    referenced_by:
      - design/gdd/player-input.md
    variables:
      - dash_duration_frames
      - dash_iframes
      - dash_cooldown_ms
    output_range: [0, 600]
    expression: "dash_iframes / dash_duration_frames = 0.75; total cycle = (dash_duration_frames + dash_cooldown_ms / 16.6)"
    notes: "F3. AC-10 verifies 8 active frames, 6 i-frames, 600ms cooldown."
    added: 2026-06-12
    revised: ""

